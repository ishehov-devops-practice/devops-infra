---
# Initialize control plane k3s master

- name: K3s master init
  hosts: master
  become: true
  tasks:
    - name: K3s installation script
      shell: "curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644"
      args:
        creates: /usr/local/bin/k3s

    - name: Get token from master
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: master_token_encoded

    - name: Store token
      set_fact:
        k3s_token: "{{ master_token_encoded.content | b64decode | trim }}"

# Initialize worker nodes

- name: K3s workers init
  hosts: workers
  become: true
  tasks:
    - name: K3s installation script pointing to master
      shell: "curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars['k3s-master-01']['ansible_host'] }}:6443 K3S_TOKEN={{ hostvars['k3s-master-01']['k3s_token'] }} sh -"
      args:
        creates: /usr/local/bin/k3s